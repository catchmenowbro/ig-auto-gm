name: Send Good Morning DM

on:
  schedule:
    - cron: '30 0 * * *'   # 00:30 UTC => 06:00 IST
  workflow_dispatch: {}    # manual run for testing

jobs:
  send_dm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install instagrapi

      - name: Restore saved session (optional)
        run: |
          if [ -n "${{ secrets.IG_SESSION_B64 }}" ]; then
            echo "${{ secrets.IG_SESSION_B64 }}" | base64 --decode > insta_settings.json
            echo "Session file restored"
          else
            echo "No saved session secret found, will login fresh"
          fi

      - name: Run send_dm
        env:
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
          FRIEND_USERNAME: ${{ secrets.FRIEND_USERNAME }}
          MESSAGE: ${{ secrets.MESSAGE }}
        run: python send_dm.py
